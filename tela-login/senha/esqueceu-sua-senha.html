<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style-senha.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>Recuperar Senha</title>
  </head>

  <body>
    <h1 class="logo">StudyFlow</h1>

    <div class="container">
      <h1>Recuperar senha</h1>

      <p>Digite seu e-mail e enviaremos um link para redefinir sua senha.</p>

      <form>
        <input type="email" placeholder="Digite seu email" required />

        <button type="submit">
          <i class="fa-solid fa-paper-plane"></i> Enviar link
        </button>
      </form>

      <a href="../index.html" class="voltar">← Voltar para login</a>
    </div>
  </body>
</html>
